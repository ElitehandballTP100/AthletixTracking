const MONTH_LABELS = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
function buildMonths() {
  const out=[], start=new Date(2026,5,1);
  for(let i=0;i<=12;i++){
    const d=new Date(start.getFullYear(),start.getMonth()+i,1);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    out.push({key,label:MONTH_LABELS[d.getMonth()],full:`${MONTH_LABELS[d.getMonth()]} ${d.getFullYear()}`});
  }
  return out;
}
const MONTHS=buildMonths();
const CURRENT_MONTH="2026-06";

function buildWeeks(){
  const out=[], start=new Date(2026,5,9);
  for(let i=0;i<52;i++){
    const d=new Date(start.getTime()+i*7*24*3600*1000);
    const year=d.getFullYear();
    const jan4=new Date(year,0,4);
    const ws=new Date(jan4.getTime()-((jan4.getDay()||7)-1)*86400000);
    const wn=Math.floor((d-ws)/(7*86400000))+1;
    const key=`${year}-W${String(wn).padStart(2,"0")}`;
    const dayStr=d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
    const endD=new Date(d.getTime()+6*86400000);
    const endStr=endD.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
    out.push({key,label:`KW${wn}`,full:`KW ${wn} (${dayStr}–${endStr})`,year});
  }
  return out;
}
const WEEKS=buildWeeks();

  const wn=Math.floor((now-ws)/(7*86400000))+1;
  return `${year}-W${String(wn).padStart(2,"0")}`;
}

function calcTrainingWeek(startDate){
  if(!startDate)return null;
  const start=new Date(startDate),now=new Date();
  start.setHours(0,0,0,0);now.setHours(0,0,0,0);
  const diff=now-start;
  if(diff<0)return null;
  return Math.floor(diff/(7*24*60*60*1000))+1;
}

/* ===== PERSONAL BEST CHECK ===== */
function checkAndUpdatePB(player,metricId,newValue,month){
  const metric=METRICS.find(m=>m.id===metricId);
  if(!metric||metric.higherBetter===null)return false;
  const existing=(player.personalBests||{})[metricId];
  if(!existing)return true;
  if(metric.higherBetter&&newValue>existing.value)return true;
  if(!metric.higherBetter&&newValue<existing.value)return true;
  return false;
}

  // Init values for selected players

    const v={};
    // Tour: only Max → pre-fill all except Kniebeuge (squat) so trainer just enters one value
    const isTourDemo=pids.length===1&&players.find(p=>p.id===pids[0]&&p.email==="demo@tour.test");

      v[pid]={};
      METRICS.forEach(m=>{
        v[pid][m.id]=isTourDemo?(DEMO_PREFILL[m.id]||""):"";
      });
    });
    setValues(v);
  }

  function togglePlayer(pid){
    setSelectedPlayers(prev=>{
      const next=prev.includes(pid)?prev.filter(x=>x!==pid):[...prev,pid];
      return next;
    });
  }
  function selectAll(){setSelectedPlayers(players.map(p=>p.id));}
  function deselectAll(){setSelectedPlayers([]);}

  function proceedToEntry(){
    if(selectedPlayers.length===0)return;
    initValues(selectedPlayers);
    setCurrentMetricIdx(0);
    setCurrentPlayerIdx(0);
    setStep(2);
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),200);

  const activePlayers=players.filter(p=>selectedPlayers.includes(p.id));

  function getVal(pid,mid){return(values[pid]||{})[mid]||"";}
  function setVal(pid,mid,v){setValues(prev=>({...prev,[pid]:{...(prev[pid]||{}),[mid]:v}}));}

  // Rapid entry: Tab/Enter advances to next player, then next metric
  function handleKeyDown(e,pid,mid){
    if(e.key==="Enter"||e.key==="Tab"){
      e.preventDefault();
      if(mode==="byMetric"){
        // next player in current metric
        if(currentPlayerIdx<activePlayers.length-1){
          setCurrentPlayerIdx(i=>i+1);
        } else {
          // next metric
          if(currentMetricIdx<METRICS.length-1){
            setCurrentMetricIdx(i=>i+1);
            setCurrentPlayerIdx(0);
          }
        }
      } else {
        if(currentMetricIdx<METRICS.length-1){
          setCurrentMetricIdx(i=>i+1);
        } else {
          if(currentPlayerIdx<activePlayers.length-1){
            setCurrentPlayerIdx(i=>i+1);
            setCurrentMetricIdx(0);
          }
        }
      }
    }
  }

  useEffect(()=>{
    if(step===2)setTimeout(()=>inputRef.current&&inputRef.current.focus(),80);
  },[currentMetricIdx,currentPlayerIdx,step]);

  // Tour: auto-fill demo values — defined at component scope so saved screen can use it

  const demoDefaults={squat:"100",bench:"80",sprint:"4.5",cmj:"38",plank:"90",weight:"82"};

      for(const pid of selectedPlayers){

        const newData={...player.data};
        const newPBs={...player.personalBests};
        let newPRFound=null;
        for(const m of METRICS){
          const raw=effectiveVal(pid,m.id);
          if(raw===""||isNaN(Number(raw)))continue;
          const val=Number(raw);
          await saveMeasurement(pid,m.id,month,val);
          const series=[...(newData[m.id]||[])];
          const idx=series.findIndex(s=>s.month===month);
          if(idx>=0)series[idx]={month,value:val};else series.push({month,value:val});
          series.sort((a,b)=>a.month.localeCompare(b.month));
          newData[m.id]=series;
          if(checkAndUpdatePB(player,m.id,val,month)){

/* ===== HELPERS: tagesgenaue Anwesenheit ===== */
function todayKey(){return new Date().toISOString().slice(0,10);}
function formatDay(d){return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'});}

/* Kalender-Monat bauen: alle Tage eines Monats */
function buildCalendarMonth(year,month){
  const days=[];
  const daysInMonth=new Date(year,month+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const key=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    days.push({key,d,dow:new Date(year,month,d).getDay()});
  }
  return days;
}

/* ===== ANWESENHEITS-KALENDER im Spielerprofil ===== */
function AttendanceCalendar({player,onUpdate}){
  const now=new Date();
  const [calYear,setCalYear]=useState(now.getFullYear());
  const [calMonth,setCalMonth]=useState(now.getMonth());
  const [saving,setSaving]=useState(null); // day key being saved

  const days=useMemo(()=>buildCalendarMonth(calYear,calMonth),[calYear,calMonth]);
  const att=player.attendance||{};

  // Stats for this month
  const monthPrefix=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const daysThisMonth=days.filter(d=>d.key<=todayKey());
  const presentCount=daysThisMonth.filter(d=>att[d.key]===true).length;
  const absentCount=daysThisMonth.filter(d=>att[d.key]===false).length;

  async function toggleDay(dayKey){
    if(IS_PREVIEW)return;
    setSaving(dayKey);
    const cur=att[dayKey];
    // cycle: undefined -> true -> false -> undefined(remove)
    let next;
    if(cur===undefined||cur===null)next=true;
    else if(cur===true)next=false;
    else next=undefined;
    try{
      if(next===undefined){
        await sb.from('attendance').delete().match({player_id:player.id,day:dayKey});
        const newAtt={...att};delete newAtt[dayKey];
        onUpdate({...player,attendance:newAtt});
      } else {
        await saveAttendance(player.id,dayKey,next);
        onUpdate({...player,attendance:{...att,[dayKey]:next}});
      }
    }catch(e){alert("Fehler: "+e.message);}
    setSaving(null);
  }

  function prevMonth(){if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);}
  function nextMonth(){if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);}

  const DOW_LABELS=['Mo','Di','Mi','Do','Fr','Sa','So'];
  // first day of month: adjust so Mon=0
  const firstDow=(new Date(calYear,calMonth,1).getDay()+6)%7;

  return React.createElement(Card,{style:{marginBottom:14}},
    React.createElement(SectionTitle,null,"📅 Anwesenheits-Kalender"),

    // Month navigation
    React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
      React.createElement(Btn,{onClick:prevMonth,style:{background:"rgba(255,255,255,0.07)",color:C.text,borderRadius:8,padding:"6px 12px",fontSize:16,border:`1px solid ${C.cardBorder}`}},"‹"),
      React.createElement("span",{style:{fontWeight:700,fontSize:16}},
        new Date(calYear,calMonth,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'})
      ),
      React.createElement(Btn,{onClick:nextMonth,style:{background:"rgba(255,255,255,0.07)",color:C.text,borderRadius:8,padding:"6px 12px",fontSize:16,border:`1px solid ${C.cardBorder}`}},"›")
    ),

    // Stats bar
    React.createElement("div",{style:{display:"flex",gap:12,marginBottom:14,fontSize:13}},
      React.createElement("div",{style:{background:"rgba(34,197,94,0.12)",border:"1px solid #22c55e",borderRadius:8,padding:"6px 12px",flex:1,textAlign:"center"}},
        React.createElement("div",{style:{fontWeight:800,fontSize:20,color:"#22c55e"}},presentCount),
        React.createElement("div",{style:{opacity:0.7,fontSize:11}},"Anwesend")
      ),
      React.createElement("div",{style:{background:"rgba(239,68,68,0.1)",border:"1px solid #ef4444",borderRadius:8,padding:"6px 12px",flex:1,textAlign:"center"}},
        React.createElement("div",{style:{fontWeight:800,fontSize:20,color:"#ef4444"}},absentCount),

/* ===== SCHNELLNOTIZ MIT SPRACHBEFEHL (von Listenansicht) ===== */
function QuickNoteModal({player,onClose,onSaved}){
  const [text,setText]=useState("");
  const [recording,setRecording]=useState(false);
  const [status,setStatus]=useState("");
  const [saving,setSaving]=useState(false);
  const recRef=useRef(null);
  const week=CURRENT_WEEK;

  function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Sprachaufnahme nur in Chrome verfügbar.");return;}
    const rec=new SR();
    rec.lang="de-DE";rec.continuous=true;rec.interimResults=true;
    const base=text;
    rec.onresult=e=>{
      let final="",interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)final+=e.results[i][0].transcript+" ";
        else interim+=e.results[i][0].transcript;
      }
      setText((base+final).trimStart()+(interim?" ["+interim+"]":""));
    };
    rec.onerror=e=>{setStatus("Fehler: "+e.error);setRecording(false);};
    rec.onend=()=>{setText(t=>t.replace(/\s*\[.*?\]/g,"").trim());setRecording(false);setStatus("Fertig.");if(window.fireTourEvent)window.fireTourEvent("voice_ended");};
    rec.start();recRef.current=rec;setRecording(true);setStatus("🎙 Aufnahme läuft…");
  }
  function stopVoice(){if(recRef.current){recRef.current.stop();recRef.current=null;}setRecording(false);}

  async function save(){
    if(!text.trim())return;
    setSaving(true);
    try{
      await saveNote(player.id,week,text.trim());
      onSaved(player.id,week,text.trim());
      onClose();
    }catch(e){alert("Fehler: "+e.message);}
    setSaving(false);
  }

  const weekObj=WEEKS.find(w=>w.key===week);

  return React.createElement("div",{style:{position:"fixed",inset:0,background:"rgba(6,12,39,0.92)",zIndex:9990,display:"flex",alignItems:"flex-end",padding:16}},
    React.createElement("div",{style:{width:"100%",maxWidth:480,margin:"0 auto",background:"#0a1535",border:`1px solid ${C.cardBorder}`,borderRadius:"20px 20px 16px 16px",padding:20}},

          React.createElement("div",{style:{fontFamily:"'Saira Condensed',sans-serif",fontSize:20,fontWeight:700}},player.name),
          React.createElement("div",{style:{fontSize:12,opacity:0.6}},weekObj?weekObj.full:"")),

      ),
      React.createElement("textarea",{
        value:text,onChange:e=>setText(e.target.value),
        placeholder:"Schnellnotiz…",autoFocus:true,rows:3,
        style:{...fieldStyle,resize:"none",lineHeight:1.5,marginBottom:10}
      }),
      React.createElement("div",{style:{display:"flex",gap:8,marginBottom:10}},
        !recording
          ?React.createElement(Btn,{onClick:startVoice,style:{flex:1,background:"rgba(72,207,253,0.12)",color:C.accent,border:`1px solid ${C.cardBorder}`,borderRadius:10,padding:"10px",fontSize:14,fontWeight:600}},"🎙 Sprechen")
          :React.createElement(Btn,{onClick:stopVoice,style:{flex:1,background:"#ef4444",color:"#fff",borderRadius:10,padding:"10px",fontSize:14,fontWeight:700}},"⏹ Stop"),
        React.createElement(Btn,{onClick:save,disabled:saving||!text.trim(),style:{flex:2,background:text.trim()?C.accent:"rgba(255,255,255,0.1)",color:text.trim()?"#060c27":"rgba(255,255,255,0.3)",borderRadius:10,padding:"10px",fontSize:14,fontWeight:700}},saving?"…":"Notiz speichern")

/* ===== MOTIVATIONSRUNDE (alle Spieler auf einem Bildschirm) ===== */
function MotivationRound({players,onPlayersUpdated,onClose}){
  const [week,setWeek]=useState(CURRENT_WEEK);
  const [saving,setSaving]=useState(null); // pid being saved
  const [done,setDone]=useState(false);
  const weekObj=WEEKS.find(w=>w.key===week);

  // local state: pid -> motKey
  const [motState,setMotState]=useState(()=>{
    const s={};
    players.forEach(p=>{s[p.id]=p.motivation[CURRENT_WEEK]||null;});
    return s;
  });

  // Re-init when week changes
  useEffect(()=>{
    const s={};
    players.forEach(p=>{s[p.id]=p.motivation[week]||null;});
    setMotState(s);
  },[week,players]);

  async function setMot(pid,key){
    setSaving(pid);
    // Toggle: if already active → remove
    const isActive=motState[pid]===key;
    try{
      if(isActive){
        await sb.from('motivation').delete().match({player_id:pid,month:week});
        setMotState(prev=>({...prev,[pid]:null}));
        const p=players.find(x=>x.id===pid);
        const newMot={...p.motivation};delete newMot[week];
        onPlayersUpdated([{...p,motivation:newMot}]);
      } else {
        await saveMotivation(pid,week,key);
        setMotState(prev=>({...prev,[pid]:key}));
        const p=players.find(x=>x.id===pid);
        onPlayersUpdated([{...p,motivation:{...p.motivation,[week]:key}}]);
      }
    }catch(e){alert("Fehler: "+e.message);}
    setSaving(null);
  }

  const filled=Object.values(motState).filter(Boolean).length;
  const total=players.length;

function WeightRound({players,onPlayersUpdated,onClose}){
  const [date,setDate]=useState(todayKey());
  const [weights,setWeights]=useState({});
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);

  // Pre-fill with current weights
  useEffect(()=>{
    const w={};
    players.forEach(p=>{w[p.id]=p.weight?String(p.weight):"";});
    setWeights(w);
  },[]);

  const month=date.slice(0,7);
  const filled=Object.values(weights).filter(v=>v!=="").length;

  async function saveAll(){
    setSaving(true);
    try{
      const updates=[];
      for(const p of players){
        const val=weights[p.id];
        if(!val||isNaN(Number(val)))continue;
        const num=Number(val);
        // Save as measurement
        await saveMeasurement(p.id,'weight',month,num);
        // Save in player record
        const updated={...p,weight:num};
        await savePlayer(updated);
        // Update measurements data locally
        const series=[...(p.data.weight||[])];
        const idx=series.findIndex(s=>s.month===month);
        if(idx>=0)series[idx]={month,value:num};else series.push({month,value:num});
        series.sort((a,b)=>a.month.localeCompare(b.month));
        updates.push({...updated,data:{...p.data,weight:series}});
      }
      if(updates.length>0)onPlayersUpdated(updates);
      setDone(true);
    }catch(e){alert("Fehler: "+e.message);}
    setSaving(false);
  }

  if(done) return React.createElement("div",{style:{textAlign:"center",padding:40}},
    React.createElement("div",{style:{fontSize:48,marginBottom:12}},"✅"),
    React.createElement("h2",{style:{fontFamily:"'Saira Condensed',sans-serif",fontSize:22,margin:"0 0 8px"}},"Gewichte gespeichert"),
    React.createElement("p",{style:{opacity:0.7,marginBottom:24}},`${filled} von ${players.length} Spielern · ${new Date(date+'T12:00:00').toLocaleDateString('de-DE')}`),
    React.createElement(Btn,{onClick:onClose,style:{background:C.accent,color:"#060c27",borderRadius:12,padding:"13px 30px",fontWeight:700,fontSize:16}},"Fertig")
  );

  return React.createElement("div",null,
    React.createElement("button",{onClick:onClose,style:{background:"none",border:"none",color:C.accent,fontSize:15,cursor:"pointer",padding:0,marginBottom:16,fontFamily:"inherit"}},"‹ Zurück"),
    React.createElement(Card,{style:{marginBottom:12}},
      React.createElement(SectionTitle,{sub:"Gewichte für alle Spieler eintragen"},"⚖️ Gewichtsrunde"),
      React.createElement("div",{style:{marginBottom:12}},
        React.createElement("label",{style:{fontSize:12,opacity:0.6,display:"block",marginBottom:6}},"DATUM"),
        React.createElement("input",{type:"date",value:date,onChange:e=>setDate(e.target.value),style:{...fieldStyle,colorScheme:"dark"}})
      ),
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,fontSize:13,opacity:0.7}},
        React.createElement("span",null,`${filled} von ${players.length} eingetragen`)
      ),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        players.map(p=>
          React.createElement("div",{key:p.id,style:{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,0.04)",border:`1px solid ${weights[p.id]?C.accent:C.cardBorder}`,borderRadius:12,padding:"10px 14px",transition:"border-color 0.2s"}},
            React.createElement("div",{style:{width:36,height:36,borderRadius:"50%",background:"rgba(72,207,253,0.15)",border:`1px solid ${C.accent}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Saira Condensed',sans-serif",fontWeight:700,fontSize:14,color:C.accent,flexShrink:0}},
              p.name.split(" ").filter(Boolean).map(n=>n[0]).join("")
            ),
            React.createElement("div",{style:{flex:1,minWidth:0}},
              React.createElement("div",{style:{fontWeight:600,fontSize:14}},p.name),
              p.weight&&React.createElement("div",{style:{fontSize:11,opacity:0.5}},`Zuletzt: ${p.weight} kg`)
            ),
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,flexShrink:0}},
              React.createElement("input",{
                type:"number",inputMode:"decimal",

/* ===== TEAM BESTLEISTUNGEN ===== */
function TeamBestleistungen({players,onClose}){
  const [activeMetric,setActiveMetric]=useState("squat");

  // For each metric: compute stats per player
  function getPlayerStats(player, metricId){
    const series=(player.data[metricId]||[]).filter(s=>s.value!=null).sort((a,b)=>a.month.localeCompare(b.month));
    if(series.length<2)return null;
    const first=series[0].value, last=series[series.length-1].value;
    const diff=last-first;
    const pct=first!==0?((diff/Math.abs(first))*100):0;
    const m=METRICS.find(x=>x.id===metricId);
    // For sprint: lower is better, so "best" diff is most negative
    const improvementValue=m.higherBetter===false?-diff:diff;
    const improvementPct=m.higherBetter===false?-pct:pct;
    return{player,first,last,diff,pct,improvementValue,improvementPct,current:last,series};
  }

  function getRankings(metricId){
    const m=METRICS.find(x=>x.id===metricId);
    const stats=players.map(p=>getPlayerStats(p,metricId)).filter(Boolean);
    if(!stats.length)return{byImprovement:[],byCurrent:[],byAbsolute:[]};

    // Sort by improvement % (best first)
    const byImprovement=[...stats].sort((a,b)=>b.improvementPct-a.improvementPct);
    // Sort by current value (best first, accounting for direction)
    const byCurrent=[...stats].sort((a,b)=>m.higherBetter===false?a.current-b.current:b.current-a.current);
    // Sort by absolute improvement
    const byAbsolute=[...stats].sort((a,b)=>b.improvementValue-a.improvementValue);
    return{byImprovement,byCurrent,byAbsolute};
  }

  const currentMetric=METRICS.find(m=>m.id===activeMetric);
  const rankings=getRankings(activeMetric);

  function Medal({rank}){
    const medals=["🥇","🥈","🥉"];
    return React.createElement("span",{style:{fontSize:18,flexShrink:0}},medals[rank]||(rank+1)+".");
  }

  function RankCard({title,subtitle,items,valueKey,formatVal,color}){
    if(!items.length)return React.createElement("div",{style:{opacity:0.4,fontSize:13,textAlign:"center",padding:"12px 0"}},"Keine Daten");
    return React.createElement(Card,{style:{marginBottom:12}},
      React.createElement("div",{style:{marginBottom:12}},
        React.createElement("div",{style:{fontSize:14,fontWeight:700,color}}," "+title),
        React.createElement("div",{style:{fontSize:11,opacity:0.55,marginTop:2}},subtitle)
      ),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        items.slice(0,5).map((s,i)=>{
          const val=typeof valueKey==="function"?valueKey(s):s[valueKey];
          const barMax=Math.abs(items[0][typeof valueKey==="function"?"improvementValue":valueKey]||1);
          const barW=Math.min(Math.abs(val)/barMax*100,100);
          return React.createElement("div",{key:s.player.id,style:{display:"flex",alignItems:"center",gap:10}},
            React.createElement(Medal,{rank:i}),
            React.createElement("div",{style:{flex:1,minWidth:0}},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
                React.createElement("span",{style:{fontSize:13,fontWeight:i===0?700:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"60%"}},s.player.name),
                React.createElement("span",{style:{fontSize:13,fontWeight:700,color:i===0?color:"rgba(255,255,255,0.7)"}},formatVal(s))
              ),
              React.createElement("div",{style:{height:4,background:"rgba(255,255,255,0.08)",borderRadius:2}},
                React.createElement("div",{style:{width:barW+"%",height:"100%",background:i===0?color:"rgba(255,255,255,0.25)",borderRadius:2,transition:"width 0.4s"}})
              )
            )
          );
        })
      )
    );
  }

  // Overall "Gesamtsieger" across all metrics
  function computeOverallRanking(){
    const scores={};
    players.forEach(p=>{scores[p.id]={player:p,points:0,medals:0};});
    METRICS.forEach(m=>{
      const r=getRankings(m.id);
      r.byImprovement.slice(0,3).forEach((s,i)=>{
        if(scores[s.player.id]){
          scores[s.player.id].points+=(3-i);
          if(i===0)scores[s.player.id].medals++;
        }
      });
    });
    return Object.values(scores).filter(x=>x.points>0).sort((a,b)=>b.points-a.points||b.medals-a.medals);
  }

  const overall=computeOverallRanking();

  return React.createElement("div",null,
    React.createElement("button",{onClick:onClose,style:{background:"none",border:"none",color:C.accent,fontSize:15,cursor:"pointer",padding:0,marginBottom:16,fontFamily:"inherit"}},"‹ Zurück"),

    React.createElement("div",{style:{marginBottom:18}},
      React.createElement("h1",{style:{fontFamily:"'Saira Condensed',sans-serif",fontSize:28,fontWeight:700,margin:0,letterSpacing:0.5}},"🏆 Team Bestleistungen"),
      React.createElement("p",{style:{margin:"2px 0 0",opacity:0.6,fontSize:13}},players.length+" Athleten im Vergleich")
    ),

    // Gesamtranking
    overall.length>0&&React.createElement(Card,{style:{marginBottom:16,background:"linear-gradient(135deg,rgba(245,158,11,0.12),rgba(6,12,39,0.8))",border:"1px solid rgba(245,158,11,0.4)"}},
      React.createElement("div",{style:{fontSize:14,fontWeight:700,color:"#f59e0b",marginBottom:12}},"🏆 Gesamtranking · Beste Entwicklung"),
      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        overall.slice(0,5).map((x,i)=>
          React.createElement("div",{key:x.player.id,style:{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 12px"}},
            React.createElement("span",{style:{fontSize:20}},["🥇","🥈","🥉"][i]||(i+1)+"."),
            React.createElement("div",{style:{flex:1}},
              React.createElement("div",{style:{fontWeight:i===0?700:500,fontSize:14}},x.player.name),
              React.createElement("div",{style:{fontSize:11,opacity:0.55}},x.player.position||"—")
            ),
            React.createElement("div",{style:{textAlign:"right"}},
              React.createElement("div",{style:{fontWeight:700,color:"#f59e0b",fontSize:14}},x.points+" Punkte"),
              x.medals>0&&React.createElement("div",{style:{fontSize:10,opacity:0.6}},x.medals+"× 🥇")
            )
          )
        )
      )
    ),

    // Metric selector
    React.createElement("div",{style:{marginBottom:14}},
      React.createElement("p",{style:{fontSize:12,opacity:0.55,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:0.5}},"Übung auswählen"),
      React.createElement("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        METRICS.map(m=>React.createElement(Btn,{
          key:m.id,onClick:()=>setActiveMetric(m.id),
          style:{background:activeMetric===m.id?C.accent:"rgba(255,255,255,0.06)",
            color:activeMetric===m.id?"#060c27":C.text,
            border:"1px solid "+(activeMetric===m.id?C.accent:C.cardBorder),
            borderRadius:20,padding:"6px 12px",fontSize:12,fontWeight:activeMetric===m.id?700:400,
            whiteSpace:"nowrap"}
        },m.name))
      )
    ),

    // Three ranking views for selected metric
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14}},
      React.createElement("div",{style:{fontFamily:"'Saira Condensed',sans-serif",fontSize:20,fontWeight:700}},currentMetric.name),
      React.createElement("span",{style:{fontSize:12,opacity:0.5}},"in "+currentMetric.unit)
    ),

    React.createElement(RankCard,{
      title:"Beste Steigerung",
      subtitle:"Wer hat sich am meisten verbessert (in %)?",
      items:rankings.byImprovement,
      valueKey:"improvementPct",
      formatVal:s=>(s.improvementPct>0?"+":"")+s.improvementPct.toFixed(1)+"% ("+s.first+"→"+s.last+" "+currentMetric.unit+")",
      color:"#22c55e"
    }),

    React.createElement(RankCard,{
      title:"Aktuelle Bestleistung",
      subtitle:currentMetric.higherBetter===false?"Niedrigstes Ergebnis gewinnt":"Höchstes Ergebnis gewinnt",
      items:rankings.byCurrent,
      valueKey:"current",
      formatVal:s=>s.current+" "+currentMetric.unit,
      color:C.accent
    }),

    React.createElement(RankCard,{
      title:"Absoluter Zuwachs",
      subtitle:"Wer hat den größten absoluten Fortschritt erzielt?",
      items:rankings.byAbsolute,
      valueKey:"improvementValue",
      formatVal:s=>{const v=s.improvementValue;return(v>0?"+":"")+Math.abs(currentMetric.id==="sprint"?v.toFixed(2):Math.round(v))+" "+currentMetric.unit;},
      color:"#a78bfa"
    })
  );
}

const EMPTY_FORM={name:"",position:"",email:"",age:"",plan:"",weight:"",height:"",plan_start_date:""};

function PlayerList({players,combines,onSelect,onAdd,onPlayersUpdated,onCombineCreated,onRemoveCombine,onReopenCombine,onCombineUpdated,activeCombineForView}){

          )
        :React.createElement("input",{type,value:form[k],onChange:e=>setForm({...form,[k]:e.target.value}),style:fieldStyle})
    );
  }

  // Long-press + scroll detection
  const pressStartRef=useRef(null);
  function handlePressStart(p,e){
    const touch=e&&e.touches&&e.touches[0];
    pressStartRef.current={
      player:p, time:Date.now(), fired:false,
      startX:touch?touch.clientX:0, startY:touch?touch.clientY:0
    };
    const t=setTimeout(()=>{
      if(pressStartRef.current&&!pressStartRef.current.fired){
        pressStartRef.current.fired=true;
        if(window.fireTourEvent)window.fireTourEvent('longpress_fired');
        setQuickMotPlayer(p);
      }
    },600);
    setLongPressTimer(t);
  }
  function handleTouchMove(e){
    // If finger moved more than 8px → cancel long press (user is scrolling)
    if(!pressStartRef.current)return;
    const touch=e.touches&&e.touches[0];
    if(!touch)return;
    const dx=Math.abs(touch.clientX-pressStartRef.current.startX);
    const dy=Math.abs(touch.clientY-pressStartRef.current.startY);
    if(dx>8||dy>8){
      // Cancel — user is scrolling
      if(longPressTimer){clearTimeout(longPressTimer);setLongPressTimer(null);}
      pressStartRef.current.fired=true; // prevent tap action too
    }
  }
  function handlePressEnd(p,e){
    if(longPressTimer){clearTimeout(longPressTimer);setLongPressTimer(null);}
    if(pressStartRef.current&&!pressStartRef.current.fired){
      pressStartRef.current.fired=true;
      onSelect(p.id);

  if(view==="weightround") return React.createElement(WeightRound,{players,onPlayersUpdated,onClose:()=>setView("list")});
  if(view==="team") return React.createElement(TeamBestleistungen,{players,onClose:()=>setView("list")});

  return React.createElement("div",null,
    /* Header */
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}},
      React.createElement("div",null,
        React.createElement("h1",{style:{fontFamily:"'Saira Condensed',sans-serif",fontSize:30,fontWeight:700,margin:0,letterSpacing:0.5}},"KADER"),

      !IS_PREVIEW&&React.createElement(Btn,{onClick:()=>{setShowForm(!showForm);setErr("");},style:{background:showForm?"transparent":C.accent,color:showForm?C.accent:"#060c27",border:`1px solid ${C.accent}`,borderRadius:10,padding:"8px 16px",fontSize:14,fontWeight:700,flexShrink:0}},showForm?"✕":"+ Spieler")

/* ===== ENTWICKLUNGS-ZUSAMMENFASSUNG ===== */
function MetricChartData(player, metricId){
  const series=player.data[metricId]||[];
  const byMonth={};
  series.forEach(s=>{byMonth[s.month]=s.value;});
  return MONTHS.filter(m=>byMonth[m.key]!=null).map(m=>({label:m.label,value:byMonth[m.key]}));
}

function DevSummary({player,onUpdate}){
  const [openId,setOpenId]=useState(null);
  const [saving,setSaving]=useState(false);
  const [inputVal,setInputVal]=useState("");
  const [inputMonth,setInputMonth]=useState(CURRENT_MONTH);
  const [prToast,setPrToast]=useState(null);

  const allMetrics=useMemo(()=>METRICS.map(m=>{
    const series=(player.data[m.id]||[]).filter(s=>s.value!=null);
    const hasSeries=series.length>=2;
    const first=hasSeries?series[0].value:null;
    const last=hasSeries?series[series.length-1].value:null;
    const diff=hasSeries?last-first:null;
    const pct=(hasSeries&&first!==0)?(diff/Math.abs(first))*100:0;
    const positive=m.higherBetter===null?null:(hasSeries?(m.higherBetter?diff>0:diff<0):null);
    const chartData=MetricChartData(player,m.id);
    return{...m,first,last,diff,pct,positive,hasSeries,chartData};
  }),[player]);

  function toggle(id){
    setOpenId(prev=>{
      if(prev!==id&&window.fireTourEvent)window.fireTourEvent("graph_opened");
      return prev===id?null:id;
    });
    setInputVal("");
    setInputMonth(CURRENT_MONTH);
  }

  async function handleSave(m){
    if(IS_PREVIEW||inputVal===""||isNaN(Number(inputVal)))return;
    setSaving(true);
    try{
      const val=Number(inputVal);
      await saveMeasurement(player.id,m.id,inputMonth,val);
      const series=[...(player.data[m.id]||[])];
      const idx=series.findIndex(s=>s.month===inputMonth);
      if(idx>=0)series[idx]={month:inputMonth,value:val};else series.push({month:inputMonth,value:val});
      series.sort((a,b)=>a.month.localeCompare(b.month));
      const newPBs={...player.personalBests};
      if(checkAndUpdatePB(player,m.id,val,inputMonth)){
        await savePersonalBest(player.id,m.id,val,inputMonth);
        newPBs[m.id]={value:val,month:inputMonth};
        setPrToast("🏆 Neuer PB: "+m.name+" "+val+m.unit+"!");
      }
      onUpdate({...player,data:{...player.data,[m.id]:series},personalBests:newPBs});
      setInputVal("");
    }catch(e){alert("Fehler: "+e.message);}
    setSaving(false);
  }

  if(allMetrics.every(m=>!m.hasSeries&&m.chartData.length===0))
    return React.createElement("p",{style:{opacity:0.5,fontSize:13,textAlign:"center",margin:"8px 0"}},"Noch keine Messdaten vorhanden. Trage Werte über Combine ein.");

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
    allMetrics.map(m=>{
      const isOpen=openId===m.id;
      const isWeight=m.id==="weight";
      const arrow=m.diff>0?"↑":m.diff<0?"↓":"→";
      const color=isWeight?C.accent:(m.positive===true?"#22c55e":m.positive===false?"#ef4444":C.accent);
      const barW=m.hasSeries?Math.min(Math.abs(m.pct),100):0;
      const displayPct=m.higherBetter===false?-m.pct:m.pct;
      const pb=(player.personalBests||{})[m.id];
      const metric=METRICS.find(x=>x.id===m.id);

      return React.createElement("div",{key:m.id,style:{background:isOpen?"rgba(72,207,253,0.06)":"rgba(255,255,255,0.04)",border:`1px solid ${isOpen?C.accent:C.cardBorder}`,borderRadius:12,overflow:"hidden",transition:"border-color 0.2s"}},

        // Clickable header row
        React.createElement(Btn,{onClick:()=>toggle(m.id),style:{width:"100%",padding:"12px 14px",display:"flex",alignItems:"center",gap:10,background:"transparent",textAlign:"left",color:C.text}},
          React.createElement("div",{style:{flex:1,minWidth:0}},
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:m.hasSeries?4:0}},
              React.createElement("span",{style:{fontWeight:700,fontSize:14,color:C.text}},m.name),
              pb&&React.createElement("span",{className:"pr-badge"},"PB "+pb.value+m.unit)
            ),
            m.hasSeries&&React.createElement("div",null,
              isWeight
                ? React.createElement("span",{style:{fontSize:12,color,fontWeight:600}},
                    `${arrow} ${m.diff>0?"+":""}${Math.round(m.diff*10)/10} ${m.unit}  ·  ${m.first} → ${m.last} ${m.unit}`)
                : React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
                    React.createElement("span",{style:{fontSize:11,opacity:0.6,whiteSpace:"nowrap"}},`${m.first} ${m.unit}`),
                    React.createElement("div",{style:{flex:1,height:3,background:"rgba(255,255,255,0.1)",borderRadius:2,minWidth:40}},
                      React.createElement("div",{style:{width:barW+"%",height:"100%",background:color,borderRadius:2}})
                    ),
                    React.createElement("span",{style:{fontSize:11,color,fontWeight:700,whiteSpace:"nowrap"}},
                      `${arrow} ${m.diff>0?"+":""}${m.id==="sprint"?m.diff.toFixed(2):Math.round(m.diff)} ${m.unit} (${displayPct>0?"+":""}${displayPct.toFixed(1)}%)`)
                  )
            ),
            !m.hasSeries&&React.createElement("span",{style:{fontSize:11,opacity:0.4}},"Noch keine Daten")
          ),
          React.createElement("span",{style:{color:C.accent,fontSize:16,transition:"transform 0.2s",transform:isOpen?"rotate(90deg)":"rotate(0deg)",flexShrink:0}},"›")
        ),

        // Expandable chart + input
        isOpen&&React.createElement("div",{style:{padding:"0 14px 14px",borderTop:`1px solid ${C.cardBorder}`}},

                    React.createElement(Line,{type:"monotone",dataKey:"value",stroke:C.accent,strokeWidth:2.5,dot:{r:3,fill:C.accent},activeDot:{r:5}})

          // Wert eintragen

            )

function PhotoSection({player,onUpdate}){
  const [photoWeek,setPhotoWeek]=useState(CURRENT_WEEK);
  const [uploading,setUploading]=useState(false);
  const [cameraMode,setCameraMode]=useState(false);
  const [capturedImg,setCapturedImg]=useState(null);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const fileInputRef=useRef(null);
  const streamRef=useRef(null);

  // Always stop camera on unmount
  useEffect(()=>{
    return()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}};
  },[]);

  const weekPhotos=(player.photos||{})[photoWeek]||[];
  const nextIndex=weekPhotos.length;
  const weekObj=WEEKS.find(w=>w.key===photoWeek);

  async function startCamera(){
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
      streamRef.current=s;setCameraMode(true);setCapturedImg(null);
      setTimeout(()=>{if(videoRef.current)videoRef.current.srcObject=s;},100);
    }catch(e){alert("Kamera nicht verfügbar: "+e.message);}
  }
  function stopCamera(){if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}setCameraMode(false);}
  function capturePhoto(){
    const video=videoRef.current,canvas=canvasRef.current;
    if(!video||!canvas)return;
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    canvas.getContext("2d").drawImage(video,0,0);
    setCapturedImg(canvas.toDataURL("image/jpeg",0.85));
    stopCamera();
  }
  async function uploadFile(file){
    setUploading(true);
    // Ensure camera is fully stopped before upload
    stopCamera();
    try{
      const result=await savePhoto(player.id,photoWeek,file,nextIndex);
      const newEntry={id:result.id,url:result.url,index:nextIndex};
      const updated={...player,photos:{...(player.photos||{}),[photoWeek]:[...weekPhotos,newEntry]}};
      onUpdate(updated);
    }catch(e){alert("Upload fehlgeschlagen: "+e.message);}
    setUploading(false);
    // Reset pointer-events in case Safari got confused
    document.body.style.pointerEvents='';
  }
  async function uploadCaptured(){
    if(!capturedImg)return;
    const res=await fetch(capturedImg);
    const blob=await res.blob();
    const file=new File([blob],`photo_${photoWeek}_${nextIndex}.jpg`,{type:"image/jpeg"});
    await uploadFile(file);
    setCapturedImg(null);
  }
  async function handleFileUpload(e){
    const file=e.target.files[0];if(!file)return;
    e.target.value="";
    await uploadFile(file);
  }
  async function handleDelete(photo){
    try{
      const path=`${player.id}/${photoWeek}_${photo.index}.jpg`;
      await deletePhoto(photo.id,path);
      const newList=weekPhotos.filter(p=>p.id!==photo.id);
      onUpdate({...player,photos:{...(player.photos||{}),[photoWeek]:newList}});
    }catch(e){alert("Fehler: "+e.message);}
  }

  return React.createElement(Card,{style:{marginBottom:14}},
    React.createElement(SectionTitle,null,"📸 Fotos"),

    // Week selector
    React.createElement("div",{style:{marginBottom:14}},
      React.createElement("label",{style:{fontSize:12,opacity:0.6,display:"block",marginBottom:6}},"WOCHE"),
      React.createElement("select",{value:photoWeek,onChange:e=>{stopCamera();setPhotoWeek(e.target.value);setCapturedImg(null);},style:fieldStyle},
        WEEKS.map(w=>React.createElement("option",{key:w.key,value:w.key},w.full))
      )
    ),

    // Photo grid
    weekPhotos.length>0&&React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}},
      weekPhotos.map(photo=>
        React.createElement("div",{key:photo.id,style:{position:"relative",borderRadius:10,overflow:"hidden",border:`1px solid ${C.cardBorder}`}},
          React.createElement("img",{src:photo.url,style:{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"},alt:"Foto"}),
          React.createElement("button",{
            onClick:()=>handleDelete(photo),
            style:{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.65)",border:"none",borderRadius:"50%",width:24,height:24,color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}
          },"✕")
        )
      )
    ),

    // Captured preview

function NotesSection({player,onUpdate}){
  const [noteWeek,setNoteWeek]=useState(CURRENT_WEEK);
  const [noteText,setNoteText]=useState((player.notes||{})[CURRENT_WEEK]||"");
  const [savingNote,setSavingNote]=useState(false);
  const [recording,setRecording]=useState(false);
  const [voiceStatus,setVoiceStatus]=useState("");
  const recRef=useRef(null);

  function changeWeek(wk){setNoteWeek(wk);setNoteText((player.notes||{})[wk]||"");setVoiceStatus("");}
  function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("Sprachaufnahme nur in Chrome verfügbar.");return;}
    const rec=new SR();rec.lang="de-DE";rec.continuous=true;rec.interimResults=true;
    const base=noteText;
    rec.onresult=e=>{
      let final="",interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript+" ";else interim+=e.results[i][0].transcript;}
      setNoteText((base+final).trimStart()+(interim?" ["+interim+"]":""));
    };
    rec.onerror=e=>{setVoiceStatus("Fehler: "+e.error);setRecording(false);};
    rec.onend=()=>{setNoteText(t=>t.replace(/\s*\[.*?\]/g,"").trim());setRecording(false);setVoiceStatus("Aufnahme beendet.");};
    rec.start();recRef.current=rec;setRecording(true);setVoiceStatus("🎙 Aufnahme läuft…");
  }
  function stopVoice(){if(recRef.current){recRef.current.stop();recRef.current=null;}setRecording(false);}
  async function handleSaveNote(){
    if(IS_PREVIEW)return;
    setSavingNote(true);
    try{await saveNote(player.id,noteWeek,noteText);onUpdate({...player,notes:{...(player.notes||{}),[noteWeek]:noteText}});if(window.fireTourEvent)window.fireTourEvent("note_saved");}
    catch(e){alert("Fehler: "+e.message);}
    setSavingNote(false);
  }
  const weekObj=WEEKS.find(w=>w.key===noteWeek);
  return React.createElement(Card,{style:{marginTop:14}},
    React.createElement(SectionTitle,null,"📝 Notizen"),
    React.createElement("select",{value:noteWeek,onChange:e=>changeWeek(e.target.value),style:{...fieldStyle,marginBottom:10}},WEEKS.map(w=>React.createElement("option",{key:w.key,value:w.key},w.full))),
    React.createElement("textarea",{value:noteText,onChange:e=>setNoteText(e.target.value),placeholder:weekObj?`Notiz für ${weekObj.full}…`:"Notiz…",rows:4,style:{...fieldStyle,resize:"vertical",lineHeight:1.5,marginBottom:10}}),
    React.createElement("div",{style:{display:"flex",gap:8,marginBottom:10}},
      !recording
        ?React.createElement(Btn,{onClick:startVoice,style:{flex:1,background:"rgba(72,207,253,0.12)",color:C.accent,border:`1px solid ${C.cardBorder}`,borderRadius:10,padding:"10px",fontSize:14,fontWeight:600}},"🎙 Sprachaufnahme")
        :React.createElement(Btn,{onClick:stopVoice,style:{flex:1,background:"#ef4444",color:"#fff",borderRadius:10,padding:"10px",fontSize:14,fontWeight:700}},"⏹ Stop")
    ),
    voiceStatus&&React.createElement("p",{style:{fontSize:12,opacity:0.7,margin:"0 0 10px",color:recording?C.accent:"rgba(255,255,255,0.6)"}},voiceStatus),
    React.createElement(Btn,{onClick:handleSaveNote,disabled:savingNote,style:{width:"100%",background:C.accent,color:"#060c27",borderRadius:10,padding:"11px",fontSize:15,fontWeight:700}},savingNote?"Wird gespeichert…":"Notiz speichern"),
    (player.notes||{})[noteWeek]&&React.createElement("div",{style:{marginTop:12,background:"rgba(72,207,253,0.07)",border:`1px solid ${C.cardBorder}`,borderRadius:10,padding:"10px 12px"}},
      React.createElement("p",{style:{fontSize:11,opacity:0.6,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:0.5}},"Gespeichert"),
      React.createElement("p",{style:{fontSize:14,margin:0,whiteSpace:"pre-wrap"}},(player.notes||{})[noteWeek])

function AppWithTour(){
  const [players,setPlayers]=useState([]);
  const [combines,setCombines]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selectedId,setSelectedId]=useState(null);
  const [isTourActive,setIsTourActive]=useState(false);
  const [reopenCombine,setReopenCombine]=useState(null);

  useEffect(()=>{
    Promise.all([loadPlayers(),loadCombines()])
      .then(([pls,cmbs])=>{setPlayers(pls);setCombines(cmbs);setLoading(false);})
      .catch(err=>{
        var b=document.getElementById('error-box');b.style.display='block';
        b.textContent='Supabase Fehler: '+err.message;setLoading(false);
      });
  },[]);

  useEffect(()=>{
    function onTourState(e){setIsTourActive(e.detail.active);}
    window.addEventListener("tour_state",onTourState);
    return()=>window.removeEventListener("tour_state",onTourState);
  },[]);

  const selected=players.find(p=>p.id===selectedId);

  function updatePlayer(updated){setPlayers(prev=>prev.map(p=>p.id===updated.id?updated:p));}
  function updatePlayers(updates){setPlayers(prev=>{let next=[...prev];updates.forEach(u=>{const i=next.findIndex(p=>p.id===u.id);if(i>=0)next[i]=u;});return next;});}
  function addPlayer(p){setPlayers(prev=>[...prev,p].sort((a,b)=>a.name.localeCompare(b.name)));}
  function removePlayer(id){setPlayers(prev=>prev.filter(p=>p.id!==id));setSelectedId(null);}
  function addCombine(c){setCombines(prev=>[c,...prev]);}

  if(loading) return React.createElement("div",{style:{padding:40,textAlign:"center",opacity:0.6,fontFamily:"'Saira',sans-serif"}},"Daten werden geladen…");

  const visiblePlayers=isTourActive?players.filter(p=>p.email==="demo@tour.test"):players;

  // Padding: push content away from tour banner
  // inDetail: banner always bottom → need bottom padding
  // not inDetail: depends on step pos
  const currentTourPos=isTourActive?(selected?"bottom":(window._tourStepPos||"bottom")):null;
  const pt=currentTourPos==="top"?"200px":"20px";
  const pb=currentTourPos==="bottom"?"200px":"60px";
  const appContent=React.createElement("div",{style:{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Saira',sans-serif",padding:`${pt} 16px ${pb}`,transition:"padding 0.3s"}},
    React.createElement("div",{style:{maxWidth:480,margin:"0 auto"}},
      selected
        ?React.createElement(PlayerDetail,{player:selected,onBack:()=>{setSelectedId(null);if(window.fireTourEvent)window.fireTourEvent("went_back");},onUpdate:updatePlayer,onDelete:removePlayer})
        :React.createElement(PlayerList,{players:visiblePlayers,combines,onSelect:(id)=>{setSelectedId(id);if(window.fireTourEvent)window.fireTourEvent('player_opened');},onAdd:addPlayer,onPlayersUpdated:updatePlayers,onCombineCreated:addCombine,onRemoveCombine:(id)=>setCombines(prev=>prev.filter(c=>c.id!==id)),onReopenCombine:(c)=>{setReopenCombine(c);},onCombineUpdated:(c)=>setCombines(prev=>prev.map(x=>x.id===c.id?c:x)),activeCombineForView:reopenCombine})
    )
  );

  return React.createElement(TourManager,{
    players,
    onPlayersUpdated:updatePlayers,
    onAddPlayer:addPlayer,
    onRemovePlayer:removePlayer,
    onSelectPlayer:setSelectedId,
    selectedId,
    inDetail:!!selected
  },appContent);
}

   text:"Während du observierst: Lang auf Max drücken → Motivationsfarbe antippen.",
   steps:[{label:"Lang drücken auf Max",event:"longpress_fired"},{label:"Motivationsfarbe antippen",event:"motivation_set"}],
   trigger:"motivation_set"},

  {id:"long_press_note",      pos:"top",   emoji:"🎙",title:"Schritt 5: Sprachnotiz",
   text:"Fällt dir etwas auf? Lang auf Max drücken → sprechen → speichern.",
   steps:[{label:"Lang drücken auf Max",event:"longpress_fired"},{label:"🎙 Sprechen starten",event:"voice_started"},{label:"⏹ Aufnahme stoppen",event:"voice_ended"}],
   trigger:"voice_ended"},

  {id:"followup_combine",     pos:"top",emoji:"📊",title:"Schritt 6: Folgemessung",
   text:"Monatlich/quartalsweise neue Werte — dann entsteht der Graph.",
   steps:[{label:"⚡ Combine öffnen",event:"combine_opened"},{label:"Folgemessung wählen",event:"combine_type_selected"},{label:"Max auswählen",event:"combine_player_selected"},{label:"Wert eintragen",event:"combine_value_entered"},{label:"Speichern",event:"combine_done"}],
   trigger:"combine_done"},

  {id:"see_graph",            pos:"bottom",emoji:"📈",title:"Schritt 7: Entwicklungsgraph",
   text:"Im Spielerprofil: Übung antippen → Graph klappt auf.",
   steps:[{label:"Max Profil öffnen",event:"player_opened"},{label:"Übung antippen",event:"graph_opened"}],
   trigger:"graph_opened"},

  {id:"motivation_round",     pos:"top",emoji:"🟢",title:"Schritt 8: Motivationsrunde",
   text:"Nach dem Training: alle Spieler auf einmal in 30 Sekunden.",
   steps:[{label:"🟢 Motivationsrunde öffnen",event:"motivation_round_opened"},{label:"Farbe für Max antippen",event:"motivation_set"}],
   trigger:"motivation_set"},

  {id:"done",                 pos:"bottom",emoji:"🎉",title:"Fertig!",
   text:"Einmalig Combine → Jede Einheit: Anwesenheit + Motivation + Notizen → Monatlich: Folgemessung → Graph zeigt Entwicklung. Max wird jetzt gelöscht.",
   steps:null, trigger:null}
];


function TourOverlay({step,onNext,onMinimize,onAbort,inDetail,minimized,onExpand}){
  const [doneSteps,setDoneSteps]=useState(0);
  const doneStepsRef=useRef(0);
  const stepNum=TOUR_STEPS.findIndex(s=>s.id===step.id);
  const isFirst=stepNum===0;
  const isLast=step.id==="done";
  const isWaiting=!isFirst&&!isLast&&step.trigger!==null;
  const progress=Math.round((stepNum/(TOUR_STEPS.length-1))*100);

  useEffect(()=>{setDoneSteps(0);doneStepsRef.current=0;},[step.id]);

  useEffect(()=>{
    if(!step.steps)return;
    function onEvt(e){
      const type=(e.detail||{}).type;
      const steps=step.steps;
      const cur=doneStepsRef.current;
      if(cur<steps.length&&steps[cur].event===type){
        doneStepsRef.current=cur+1;
        setDoneSteps(cur+1);
      }
    }
    window.addEventListener("tour_event",onEvt);
    return()=>window.removeEventListener("tour_event",onEvt);
  },[step.id]);

  const pos=inDetail?"bottom":(step.pos||"bottom");
  const isTop=pos==="top";

  // ── Minimized pill ────────────────────────────────────────────────────────
  if(minimized){
    const pillStyle=isTop
      ?{position:"fixed",top:8,left:"50%",transform:"translateX(-50%)",zIndex:10000}
      :{position:"fixed",bottom:8,left:"50%",transform:"translateX(-50%)",zIndex:10000};
    return React.createElement("div",{className:wrapClass,style:pillStyle},
      React.createElement("button",{onClick:onExpand,style:{background:"linear-gradient(135deg,#0a1535,#0d2040)",border:"2px solid "+C.accent,borderRadius:50,padding:"8px 18px",display:"flex",alignItems:"center",gap:10,color:C.text,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 20px rgba(72,207,253,0.4)"}},
        React.createElement("span",{style:{fontSize:16}},step.emoji),
        React.createElement("span",{style:{fontFamily:"'Saira Condensed',sans-serif",fontSize:13,fontWeight:700,color:C.accent}},"Tour: "+step.title),
        React.createElement("span",{style:{fontSize:11,opacity:0.5}},stepNum+"/"+(TOUR_STEPS.length-1)),
        React.createElement("span",{style:{fontSize:12,color:C.accent}},"▲")
      )
    );
  }

  // ── Full overlay ──────────────────────────────────────────────────────────
  const wrapStyle=isTop
    ?{position:"fixed",top:0,left:0,right:0,zIndex:10000,padding:"0 12px",pointerEvents:"none"}
    :{position:"fixed",bottom:0,left:0,right:0,zIndex:10000,padding:"0 12px 12px",pointerEvents:"none"};
  const wrapClass="tour-overlay-wrap";
  const cardRadius=isTop?"0 0 18px 18px":"18px 18px 0 0";
  const cardShadow=isTop?"0 4px 24px rgba(72,207,253,0.25)":"0 -4px 24px rgba(72,207,253,0.25)";

  return React.createElement("div",{className:wrapClass,style:wrapStyle},
    React.createElement("div",{style:{maxWidth:480,margin:"0 auto",background:"linear-gradient(135deg,#071228,#0c1e3a)",border:"2px solid "+C.accent,borderRadius:cardRadius,padding:14,boxShadow:cardShadow,pointerEvents:"all"}},

      // Header: progress + step + minimize + abort
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
        React.createElement("div",{style:{flex:1,height:3,background:"rgba(255,255,255,0.1)",borderRadius:2}},
          React.createElement("div",{style:{width:progress+"%",height:"100%",background:C.accent,borderRadius:2,transition:"width 0.5s"}})
        ),
        React.createElement("span",{style:{fontSize:11,opacity:0.45,flexShrink:0}},stepNum+"/"+(TOUR_STEPS.length-1)),
        // Minimize — hides overlay but tour continues
        React.createElement("button",{onClick:onMinimize,style:{background:"rgba(72,207,253,0.15)",border:"1px solid rgba(72,207,253,0.3)",borderRadius:20,color:C.accent,fontSize:11,fontWeight:700,cursor:"pointer",padding:"3px 10px",fontFamily:"inherit",flexShrink:0}},
          isTop?"▲ Minimieren":"▼ Minimieren"
        ),
        // Abort — only shown as small text, needs confirm
        React.createElement("button",{
          onClick:()=>{if(window.confirm("Tour wirklich beenden? Der Fortschritt geht verloren."))onAbort();},
          style:{background:"none",border:"none",color:"rgba(255,255,255,0.2)",fontSize:11,cursor:"pointer",padding:"1px 4px",fontFamily:"inherit",flexShrink:0}
        },"Tour beenden")
      ),

      // Emoji + title + text
      React.createElement("div",{style:{display:"flex",gap:10,alignItems:"flex-start",marginBottom:step.steps?10:10}},
        React.createElement("span",{style:{fontSize:20,lineHeight:1,flexShrink:0,marginTop:2}},step.emoji),
        React.createElement("div",null,
          React.createElement("div",{style:{fontFamily:"'Saira Condensed',sans-serif",fontSize:16,fontWeight:700,color:C.accent,marginBottom:3}},step.title),
          React.createElement("p",{style:{fontSize:12,opacity:0.8,margin:0,lineHeight:1.4}},step.text)
        )
      ),

      // Sub-step chips
      step.steps&&React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}},
        step.steps.map((s,i)=>{
          const label=typeof s==="string"?s:s.label;
          const done=i<doneSteps;
          const active=i===doneSteps;
          return React.createElement("div",{key:i,style:{
            background:done?"rgba(72,207,253,0.18)":active?"rgba(72,207,253,0.1)":"rgba(255,255,255,0.04)",
            color:done?C.accent:active?C.accent:"rgba(255,255,255,0.3)",
            border:"1px solid "+(done||active?C.accent:"rgba(255,255,255,0.1)"),
            borderRadius:20,padding:"5px 11px",fontSize:11,fontWeight:done||active?700:400,
            fontFamily:"inherit",
            boxShadow:active?"0 0 8px rgba(72,207,253,0.35)":"none",
            display:"flex",alignItems:"center",gap:5,
            transition:"all 0.25s"
          }},
            done&&React.createElement("span",{style:{fontSize:10}},"✓"),
            label
          );
        })
      ),

      // Action button or waiting
      (isFirst||isLast||!isWaiting)
        ?React.createElement(Btn,{onClick:onNext,style:{width:"100%",background:isLast?"#22c55e":C.accent,color:"#060c27",borderRadius:10,padding:"10px",fontWeight:800,fontSize:14}},
            isFirst?"Tour starten →":isLast?"✓ Fertig — Demo-Spieler löschen":"Weiter →"
          )
        :React.createElement("div",{style:{textAlign:"center",fontSize:11,opacity:0.35,padding:"3px 0"}},"⏳ Führe die markierten Schritte durch — Tour springt automatisch weiter")
    )
  );
}


function TourManager({players,onPlayersUpdated,onAddPlayer,onRemovePlayer,onSelectPlayer,selectedId,inDetail,children}){
  const TOUR_KEY="athletik_tour_v2";
  const TOUR_PROGRESS_KEY="athletik_tour_progress_v2";
  const [tourActive,setTourActive]=useState(false);
  const [tourMinimized,setTourMinimized]=useState(false);
  const [stepId,setStepId]=useState("welcome");
  const [demoPlayer,setDemoPlayer]=useState(null);
  const [showStartBtn,setShowStartBtn]=useState(false);
  const stepIdRef=useRef("welcome");
  const advanceRef=useRef(null);

  useEffect(()=>{stepIdRef.current=stepId;},[stepId]);

  // On mount: check if tour was in progress
  useEffect(()=>{
    try{
      const done=localStorage.getItem(TOUR_KEY);
      if(done){setShowStartBtn(false);return;}
      // Restore in-progress tour
      const saved=localStorage.getItem(TOUR_PROGRESS_KEY);
      if(saved){
        const {sid}=JSON.parse(saved);
        if(sid&&sid!=="welcome"){
          setStepId(sid);
          const step=TOUR_STEPS.find(s=>s.id===sid);
          if(step)window._tourStepPos=step.pos||"bottom";
          window._tourActive=true;
          window.dispatchEvent(new CustomEvent('tour_state',{detail:{active:true}}));
          setTourActive(true);
          setTourMinimized(false);
          return;
        }
      }
      setShowStartBtn(true);
    }catch(_){setShowStartBtn(true);}
  },[]);

  // Save progress whenever step changes
  useEffect(()=>{
    if(tourActive&&stepId!=="done"){
      try{localStorage.setItem(TOUR_PROGRESS_KEY,JSON.stringify({sid:stepId}));}catch(_){}
    }
  },[stepId,tourActive]);

  useEffect(()=>{
    function onEvt(e){
      const type=(e.detail||{}).type;
      const step=TOUR_STEPS.find(s=>s.id===stepIdRef.current);
      if(step&&step.trigger===type&&advanceRef.current)advanceRef.current();
    }
    window.addEventListener("tour_event",onEvt);
    return()=>window.removeEventListener("tour_event",onEvt);
  },[]);

  function advance(){
    const idx=TOUR_STEPS.findIndex(s=>s.id===stepIdRef.current);
    if(idx<TOUR_STEPS.length-1){
      const next=TOUR_STEPS[idx+1];
      window._tourStepPos=next.pos||"bottom";
      setStepId(next.id);
      setTourMinimized(false); // auto-expand when step advances
      // Signal if this is a long-press step
      const isLongPress=next.id==="long_press_motivation"||next.id==="long_press_note";
      window.fireTourEvent(isLongPress?"tour_step_longpress":"tour_step_normal");
    }
  }

  // Auto-minimize when long press fires so the popup is not covered
  useEffect(()=>{
    function onEvt(e){
      const type=(e.detail||{}).type;
      if(type==="longpress_fired") setTourMinimized(true);
      // Re-expand after popup closes (motivation_set or note_saved)
      if(type==="motivation_set"||type==="note_saved"||type==="voice_ended") setTourMinimized(false);
    }
    window.addEventListener("tour_event",onEvt);
    return()=>window.removeEventListener("tour_event",onEvt);
  },[]);
  advanceRef.current=advance;
  window.fireTourEvent=function(type){window.dispatchEvent(new CustomEvent("tour_event",{detail:{type}}));};

  function getDemo(){return players.find(p=>p.email==="demo@tour.test")||demoPlayer;}

  async function startTour(){
    const allDemos=players.filter(p=>p.email==="demo@tour.test");
    for(const ex of allDemos){await deletePlayerFromDB(ex.id).catch(()=>{});onRemovePlayer(ex.id);}
    try{
      const {data:orphans}=await sb.from('players').select('id').eq('email','demo@tour.test');
      if(orphans&&orphans.length>0)for(const o of orphans)await deletePlayerFromDB(o.id).catch(()=>{});
    }catch(_){}
    window._tourActive=true;
    window._tourStepPos="bottom";
    window.dispatchEvent(new CustomEvent('tour_state',{detail:{active:true}}));
    setTourActive(true);setStepId("welcome");setTourMinimized(false);
    try{
      const demo=await addPlayerToDB({name:"Max Mustermann",position:"Rückraum Mitte",email:"demo@tour.test",age:24,plan:"TP100 Trainingsplan",plan_start_date:todayKey(),weight:"",height:""});
      setDemoPlayer(demo);onAddPlayer(demo);
    }catch(e){console.error(e);}
  }

  async function handleNext(){
    const step=TOUR_STEPS.find(s=>s.id===stepId);if(!step)return;
    if(step.id==="welcome"){advance();return;}
    if(step.id==="player_created"){const d=getDemo();if(d)onSelectPlayer(d.id);advance();return;}
    if(step.id==="see_graph"){advance();return;}
    if(step.id==="done"){
      const d=getDemo();if(d){await deletePlayerFromDB(d.id).catch(()=>{});onRemovePlayer(d.id);}
      try{localStorage.setItem(TOUR_KEY,"1");localStorage.removeItem(TOUR_PROGRESS_KEY);}catch(_){}
      window._tourActive=false;
      window.dispatchEvent(new CustomEvent('tour_state',{detail:{active:false}}));
      setTourActive(false);setShowStartBtn(false);setDemoPlayer(null);return;
    }
    if(!step.trigger){advance();return;}
  }

  async function abortTour(){
    const allDemos=players.filter(p=>p.email==="demo@tour.test");
    for(const ex of allDemos){await deletePlayerFromDB(ex.id).catch(()=>{});onRemovePlayer(ex.id);}
    try{localStorage.setItem(TOUR_KEY,"1");localStorage.removeItem(TOUR_PROGRESS_KEY);}catch(_){}
    window._tourActive=false;
    window.dispatchEvent(new CustomEvent('tour_state',{detail:{active:false}}));
    setTourActive(false);setShowStartBtn(false);
  }

  function restartTour(){
    try{localStorage.removeItem(TOUR_KEY);localStorage.removeItem(TOUR_PROGRESS_KEY);}catch(_){}
    setShowStartBtn(false);startTour();
  }

  const currentStep=TOUR_STEPS.find(s=>s.id===stepId)||TOUR_STEPS[0];
  const tourPos=inDetail?"bottom":(currentStep.pos||"bottom");
  const isTop=tourPos==="top";

  return React.createElement(React.Fragment,null,
    children,
    !tourActive&&showStartBtn&&React.createElement("button",{onClick:startTour,style:{position:"fixed",bottom:20,right:16,zIndex:9998,background:C.accent,color:"#060c27",border:"none",borderRadius:50,padding:"12px 20px",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 20px rgba(72,207,253,0.4)",display:"flex",alignItems:"center",gap:8}},
      React.createElement("span",{style:{fontSize:16}},"🚀"),"App-Tour starten"
    ),
    !tourActive&&!showStartBtn&&React.createElement("button",{onClick:restartTour,style:{position:"fixed",bottom:20,right:16,zIndex:9998,background:"rgba(72,207,253,0.12)",color:C.accent,border:"1px solid "+C.cardBorder,borderRadius:50,padding:"8px 14px",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}},"ⓘ Tour"),
    tourActive&&React.createElement(TourOverlay,{
      step:currentStep,
      onNext:handleNext,
      onMinimize:()=>setTourMinimized(true),
      onExpand:()=>setTourMinimized(false),
      onAbort:abortTour,
      inDetail:inDetail,
      minimized:tourMinimized
    })
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root,null));
</script>
